<h1>🏠 Portal del Arrendatario</h1>

<div class="menu">

  <button>
    💵 Mis Pagos
  </button>

  <button>
    🧹 Tareas
  </button>

  <button>
    🔧 Solicitudes
  </button>

  <button>
    💰 Gastos Compartidos
  </button>

</div>

<h2>💵 Mis Pagos</h2>

<div
  class="payment-card"
  *ngFor="let payment of payments$ | async">

  <h3>{{ payment.concepto }}</h3>

  <p class="amount">
    💰 ${{ payment.monto }}
  </p>

  <p
    class="status"
    [ngClass]="{
      'paid': payment.estado === 'Pagado',
      'pending': payment.estado === 'Pendiente',
      'expired': payment.estado === 'Vencido'
    }">

    {{ payment.estado }}

  </p>

  <p>
    🏠 Depto {{ payment.departamento }}
  </p>

  <button>
    💳 Ver datos de transferencia
  </button>

  <div class="transfer-info">

    <p>🏦 Banco Estado</p>

    <p>📄 Cuenta Corriente</p>

    <p>🔢 12345678</p>

    <p>👤 Inmobiliaria RoomSync</p>

  </div>

</div>
