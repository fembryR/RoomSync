<div class="login-container">

  <h1>RoomSync</h1>

  <h2>Registro</h2>

  <input
    type="email"
    placeholder="Correo electrónico"
    [(ngModel)]="email">

  <input
    type="password"
    placeholder="Contraseña"
    [(ngModel)]="password">

  <button (click)="register()">
    Crear cuenta
  </button>

  <button (click)="goToLogin()">
    Volver al Login
  </button>

  <p *ngIf="error">
    {{ error }}
  </p>

</div>
