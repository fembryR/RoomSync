<div class="login-container">

  <h1>🏢 RoomSync</h1>

    <h2>
        Gestión Inteligente de Arriendos
    </h2>

  <h2>Iniciar Sesión</h2>

  <input
    type="email"
    placeholder="Correo electrónico"
    [(ngModel)]="email">

  <input
    type="password"
    placeholder="Contraseña"
    [(ngModel)]="password">

  <button (click)="login()">
    Ingresar
  </button>

  <button (click)="goToRegister()">
    Registrarse
  </button>

  <p *ngIf="error">
    {{ error }}
  </p>

</div>
